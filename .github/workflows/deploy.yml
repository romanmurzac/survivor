name: Deploy Survivor to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 Checkout the repository
      - uses: actions/checkout@v4

      # 2 Install Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3 Add wasm target
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      # 4 Cache Cargo dependencies and target folder
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # 5 Cache Trunk binary
      - name: Cache Trunk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk

      # 6 Install Trunk only if missing
      - name: Install Trunk if missing
        run: |
          if ! command -v trunk &> /dev/null; then
            cargo install trunk --locked
          fi
        env:
          CARGO_HOME: $HOME/.cargo

      # 7 Clean dist folder before build
      - name: Clean dist
        run: rm -rf dist/*

      # 8 Build project with Trunk (production, public URL for GitHub Pages)
      - name: Build Survivor
        run: trunk build --release --public-url /survivor/
        env:
          CARGO_INCREMENTAL: 0  # force full rebuild to avoid stale files

      # 9 Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist